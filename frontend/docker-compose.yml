services:
  nginx:
    image: nginx:alpine
    container_name: front-ertlh-nginx
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./dist/spa:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/apps/go-ertlh/public/storage:/data/storage:ro
    networks:
      - lara-network

networks:
  lara-network:
    external: true