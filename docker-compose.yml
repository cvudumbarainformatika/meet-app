name: meetapp

# =============================================================
# MeetApp — Docker Compose (Production / Development)
# Services:
#   1. livekit   - WebRTC SFU Media Server
#   2. coturn    - TURN/STUN Server (NAT traversal)
#   3. postgres  - Database
#   4. redis     - Cache & LiveKit state
#   5. api       - Backend REST API (Fastify)
#   6. frontend  - Quasar SPA (served via Nginx)
#   7. nginx     - Reverse Proxy (entry point)
# =============================================================

networks:
  meetapp-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:

  # -----------------------------------------------------------
  # 1. LiveKit — WebRTC SFU Media Server
  # -----------------------------------------------------------
  livekit:
    image: livekit/livekit-server:latest
    container_name: meetapp-livekit
    restart: unless-stopped
    command: --config /etc/livekit/livekit.yaml --node-ip=${LIVEKIT_NODE_IP:-127.0.0.1}
    ports:
      - "7880:7880"       # HTTP/WebSocket signaling
      - "7881:7881"       # WebRTC TCP
      - "7882:7882/udp"   # WebRTC UDP
    volumes:
      - ./services/livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-devsecret_panjang_minimal_32karakter}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - meetapp-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # 2. Coturn — TURN/STUN Server
  # -----------------------------------------------------------
  coturn:
    image: coturn/coturn:latest
    container_name: meetapp-coturn
    restart: unless-stopped
    network_mode: host  # TURN butuh akses network langsung
    volumes:
      - ./services/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: -c /etc/coturn/turnserver.conf

  # -----------------------------------------------------------
  # 3. PostgreSQL — Database
  # -----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: meetapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meetapp}
      POSTGRES_USER: ${POSTGRES_USER:-meetapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meetapp_pass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - meetapp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meetapp} -d ${POSTGRES_DB:-meetapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # 4. Redis — Cache & LiveKit State Store
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: meetapp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - meetapp-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # 5. Backend API — Fastify + Node.js
  # -----------------------------------------------------------
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: meetapp-api
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_SECRET: ${APP_SECRET:-changeme_secret_panjang_minimal_32karakter}
      API_PORT: ${API_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-jwt_secret_panjang_minimal_32karakter}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-meetapp}
      POSTGRES_USER: ${POSTGRES_USER:-meetapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meetapp_pass}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      LIVEKIT_HOST: livekit
      LIVEKIT_PORT: ${LIVEKIT_PORT:-7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecret_panjang_minimal_32karakter}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meetapp-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # 6. Frontend — Quasar SPA via Nginx
  # -----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: meetapp-frontend
    restart: unless-stopped
    networks:
      - meetapp-net

  # -----------------------------------------------------------
  # 7. Nginx — Reverse Proxy (satu-satunya entry point)
  # -----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: meetapp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - meetapp-net
