worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout 65;
  client_max_body_size 50M;

  # Gzip compression
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1000;

  # =============================================================
  # Upstream Backends
  # =============================================================
  upstream api_backend {
    server api:3000;
    keepalive 32;
  }

  upstream frontend_backend {
    server frontend:9000;
    keepalive 32;
  }

  # =============================================================
  # Main Server Block
  # =============================================================
  server {
    listen 80;
    server_name _;

    # ----------------------------------------------------------
    # Health check endpoint (nginx level)
    # ----------------------------------------------------------
    location /nginx-health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }

    # ----------------------------------------------------------
    # API Routes → Backend Fastify
    # ----------------------------------------------------------
    location /api/ {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_connect_timeout 10s;
      proxy_read_timeout 60s;
    }

    # ----------------------------------------------------------
    # WebSocket untuk LiveKit Signaling
    # ----------------------------------------------------------
    location /livekit/ {
      proxy_pass http://livekit:7880/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 86400s;  # Keep WS alive
    }

    # ----------------------------------------------------------
    # Frontend SPA → Quasar (served by nginx inside container)
    # ----------------------------------------------------------
    location / {
      proxy_pass http://frontend_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection "";
      # HMR dan WebSockets
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";

      # SPA: fallback dihandle otomatis oleh vite dev server
    }
  }
}
