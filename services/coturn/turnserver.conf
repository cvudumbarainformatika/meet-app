# =============================================================
# Coturn — TURN/STUN Server Configuration
# Docs: https://github.com/coturn/coturn/wiki/turnserver
# =============================================================

# Listening port
listening-port=3478
tls-listening-port=5349

# Bind address (0.0.0.0 = all interfaces)
listening-ip=0.0.0.0

# External/relay IP (otomatis detect, override jika perlu)
# relay-ip=YOUR_PUBLIC_IP
# external-ip=YOUR_PUBLIC_IP

# Realm (nama domain atau identifier server)
realm=meetapp.local

# Authentication mode: use long-term credentials
lt-cred-mech

# Static credentials (harus cocok dengan .env TURN_USERNAME / TURN_PASSWORD)
user=meetapp:turnpass

# Logging
log-file=/tmp/turnserver.log
verbose

# Security: disable telnet (CLI)
no-cli

# Fingerprint untuk interoperabilitas
fingerprint

# Allowed peer IPs (uncomment untuk restrict)
# denied-peer-ip=10.0.0.0-10.255.255.255
# denied-peer-ip=172.16.0.0-172.31.255.255
# denied-peer-ip=192.168.0.0-192.168.255.255

# Quota per user
user-quota=100
total-quota=300
